<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSONsx Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #1e1e1e;
      --bg-panel: #252526;
      --bg-input: #3c3c3c;
      --border:   #3c3c3c;
      --fg:       #cccccc;
      --fg-dim:   #808080;
      --accent:   #007acc;
      --accent-fg:#ffffff;
      --danger:   #f44747;
      --success:  #89d185;
      --tag:      #569cd6;
      --signal:   #dcdcaa;
      --handler:  #c586c0;
      --radius:   3px;
      --panel-w-left:  240px;
      --panel-w-right: 280px;
    }
    html, body { height: 100%; overflow: hidden; font: 12px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--fg); background: var(--bg); }

    /* ─── Layout ─────────────────────────────────── */
    #app { display: grid; grid-template-rows: 36px 1fr 24px; grid-template-columns: var(--panel-w-left) 1fr var(--panel-w-right); height: 100%; }
    #toolbar   { grid-column: 1 / -1; display: flex; align-items: center; gap: 6px; padding: 0 8px; background: var(--bg-panel); border-bottom: 1px solid var(--border); }
    #left-panel  { grid-row: 2; overflow-y: auto; background: var(--bg-panel); border-right: 1px solid var(--border); }
    #canvas-wrap { grid-row: 2; position: relative; overflow: auto; background: #f5f5f5; }
    #right-panel { grid-row: 2; overflow-y: auto; background: var(--bg-panel); border-left: 1px solid var(--border); }
    #statusbar { grid-column: 1 / -1; display: flex; align-items: center; padding: 0 8px; font-size: 11px; color: var(--fg-dim); background: var(--bg-panel); border-top: 1px solid var(--border); }

    /* ─── Canvas ─────────────────────────────────── */
    #canvas { padding: 16px; min-height: 100%; transform-origin: top left; }
    #canvas * { cursor: default; }
    #overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
    #overlay-click { position: absolute; inset: 0; z-index: 9; cursor: default; }
    .overlay-box { position: absolute; pointer-events: none; }
    .overlay-selection { border: 2px solid var(--accent); }
    .overlay-hover { border: 1px solid rgba(0,122,204,0.5); }
    .overlay-label { position: absolute; top: -20px; left: -1px; padding: 1px 5px; font-size: 10px; background: var(--accent); color: var(--accent-fg); border-radius: 2px 2px 0 0; white-space: nowrap; pointer-events: none; }

    /* ─── Panel tabs ─────────────────────────────── */
    .panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .panel-tab { flex: 1; padding: 6px 0; text-align: center; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-dim); border-bottom: 2px solid transparent; }
    .panel-tab:hover { color: var(--fg); }
    .panel-tab.active { color: var(--fg); border-bottom-color: var(--accent); }
    .panel-body { padding: 0; }

    /* ─── Layers ─────────────────────────────────── */
    .layer-row { display: flex; align-items: center; gap: 4px; padding: 3px 8px; cursor: pointer; white-space: nowrap; user-select: none; border-left: 2px solid transparent; }
    .layer-row:hover { background: rgba(255,255,255,0.04); }
    .layer-row.selected { background: rgba(0,122,204,0.2); border-left-color: var(--accent); }
    .layer-indent { flex-shrink: 0; }
    .layer-toggle { width: 14px; text-align: center; font-size: 9px; color: var(--fg-dim); cursor: pointer; flex-shrink: 0; }
    .layer-tag { padding: 0 4px; font-size: 10px; border-radius: 2px; color: var(--accent-fg); background: var(--tag); flex-shrink: 0; }
    .layer-label { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .layer-dot { font-size: 9px; flex-shrink: 0; }
    .layer-delete { visibility: hidden; cursor: pointer; color: var(--danger); font-size: 11px; flex-shrink: 0; }
    .layer-row:hover .layer-delete { visibility: visible; }

    /* ─── Inspector ──────────────────────────────── */
    .inspector-section { border-bottom: 1px solid var(--border); }
    .inspector-header { display: flex; align-items: center; padding: 8px; cursor: pointer; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-dim); user-select: none; }
    .inspector-header::before { content: '▼'; margin-right: 6px; font-size: 8px; transition: transform 0.15s; }
    .inspector-header.collapsed::before { transform: rotate(-90deg); }
    .inspector-fields { padding: 4px 8px 8px; }
    .inspector-fields.hidden { display: none; }
    .field-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .field-label { width: 80px; flex-shrink: 0; font-size: 11px; color: var(--fg-dim); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field-input { flex: 1; min-width: 0; padding: 3px 6px; font: inherit; font-size: 11px; color: var(--fg); background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); outline: none; }
    .field-input:focus { border-color: var(--accent); }
    .field-input[type="checkbox"] { width: auto; flex: none; }
    textarea.field-input { resize: vertical; min-height: 60px; font-family: 'SF Mono', 'Fira Code', monospace; }

    /* ─── Style editor (key-value list) ──────────── */
    .kv-row { display: flex; gap: 4px; margin-bottom: 3px; }
    .kv-key { width: 90px; flex-shrink: 0; }
    .kv-val { flex: 1; min-width: 0; }
    .kv-del { width: 20px; text-align: center; cursor: pointer; color: var(--danger); font-size: 13px; line-height: 24px; }
    .kv-add { display: inline-block; padding: 2px 8px; font-size: 11px; cursor: pointer; color: var(--accent); }
    .kv-add:hover { text-decoration: underline; }

    /* ─── Defs list ──────────────────────────────── */
    .def-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
    .def-badge { padding: 0 4px; font-size: 10px; border-radius: 2px; color: var(--accent-fg); }
    .def-badge.signal { background: #4a3d00; color: var(--signal); }
    .def-badge.handler { background: #3d2042; color: var(--handler); }
    .def-badge.computed { background: #1a3a1a; color: var(--success); }
    .def-name { flex: 1; font-family: monospace; font-size: 11px; }
    .def-del { cursor: pointer; color: var(--danger); font-size: 11px; }

    /* ─── Toolbar ────────────────────────────────── */
    .tb-group { display: flex; align-items: center; gap: 2px; padding: 0 6px; border-right: 1px solid var(--border); }
    .tb-group:last-child { border-right: none; }
    .tb-btn { padding: 3px 8px; font: inherit; font-size: 11px; color: var(--fg); background: transparent; border: 1px solid transparent; border-radius: var(--radius); cursor: pointer; white-space: nowrap; }
    .tb-btn:hover { background: rgba(255,255,255,0.08); }
    .tb-btn:active { background: rgba(255,255,255,0.12); }
    .tb-btn:disabled { opacity: 0.4; cursor: default; }
    .tb-sep { width: 1px; height: 16px; background: var(--border); }
    .tb-filename { font-size: 11px; color: var(--fg-dim); max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .tb-dirty { color: var(--accent); font-size: 16px; line-height: 1; }
    .tb-spacer { flex: 1; }

    /* ─── Source view ────────────────────────────── */
    #source-view { width: 100%; height: 100%; background: var(--bg); color: var(--fg); font: 11px/1.6 'SF Mono', 'Fira Code', monospace; border: none; padding: 8px; resize: none; outline: none; }

    /* ─── Empty state ────────────────────────────── */
    .empty-state { padding: 24px; text-align: center; color: var(--fg-dim); font-size: 13px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar"></div>
    <div id="left-panel"></div>
    <div id="canvas-wrap">
      <div id="canvas"></div>
      <div id="overlay"></div>
      <div id="overlay-click"></div>
    </div>
    <div id="right-panel"></div>
    <div id="statusbar"></div>
  </div>
  <script type="module" src="./studio.js"></script>
</body>
</html>
