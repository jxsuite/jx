<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jx Markdown Blog — Example</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      .prose {
        line-height: 1.7;
      }
      .prose h2 {
        margin-top: 2em;
      }
      .prose pre {
        background: #f5f5f5;
        padding: 1rem;
        border-radius: 4px;
        overflow-x: auto;
      }
      .prose code {
        font-family: "SF Mono", Menlo, monospace;
        font-size: 0.9em;
      }
      .prose blockquote {
        border-left: 3px solid #ddd;
        margin-left: 0;
        padding-left: 1rem;
        color: #555;
      }
      .prose table {
        border-collapse: collapse;
        width: 100%;
      }
      .prose th,
      .prose td {
        border: 1px solid #ddd;
        padding: 0.5rem 0.75rem;
        text-align: left;
      }
      .prose th {
        background: #f9f9f9;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { Jx } from "../../packages/runtime/dist/runtime.js";
      await Jx("./blog.json", document.body);
    </script>
  </body>
</html>
